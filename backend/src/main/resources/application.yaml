spring:
  application:
    name: Ascendia
  datasource:
    url: jdbc:postgresql://db:5432/ascendia_db
    username: ascendia
    password: ascendia
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
  sql:
    init:
      platform: postgres