services:
  db:
    image: postgres:16
    container_name: ascendia_db
    volumes:
      -postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=ascendia_db
      - POSTGRES_USER=ascendia
      - POSTGRES_PASSWORD=ascendia
    ports:
      - 5432:5432

  backend:
    build: ./backend
    container_name: ascendia-api
    ports:
      - 8080:8080
    environment:
        - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/ascendia_db
        - SPRING_DATASOURCE_USERNAME=ascendia
        - SPRING_DATASOURCE_PASSWORD=ascendia
        - SPRING_JPA_HIBERNATE_DDL_AUTO=update
        - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.PostgreSQLDialect
    restart: on-failure
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: ascendia-ui
    ports:
      - 4200:80
    depends_on:
      - backend

volumes:
  postgres_data: